<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infografías</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 8px;
    }
    p.sub {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 40px;
    }
    ul {
      list-style: none;
      width: 100%;
      max-width: 420px;
    }
    li + li { margin-top: 8px; }
    a {
      display: block;
      padding: 14px 18px;
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      color: #ddd;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }
    a:hover {
      border-color: #444;
      background: #161616;
    }
    .title {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .desc {
      font-size: 0.78rem;
      color: #777;
      margin-top: 4px;
    }
    @media (max-width: 768px) {
      body {
        padding: 28px 16px;
        padding-top: max(28px, env(safe-area-inset-top));
        padding-bottom: max(28px, env(safe-area-inset-bottom));
      }
      a { padding: 16px 18px; min-height: 48px; }
    }
  </style>
</head>
<body>
  <h1>Infografías</h1>
  <p class="sub">Colección de visualizaciones interactivas</p>
  <ul>
    <li>
      <a href="algarrobo/">
        <div class="title">Algarrobo en crisis — Perú</div>
        <div class="desc">Deforestación del bosque seco norte · mapa interactivo</div>
      </a>
    </li>
  </ul>
</body>
</html>
